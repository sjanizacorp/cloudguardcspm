[pytest]
testpaths = tests
log_cli = true
log_cli_level = DEBUG
log_cli_format = %(asctime)s %(levelname)-8s %(name)-40s %(message)s
log_cli_date_format = %H:%M:%S
log_file = logs/test_run.log
log_file_level = DEBUG
log_file_format = %(asctime)s %(levelname)-8s %(name)-40s %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
addopts = -v --tb=short --show-capture=all
markers =
    unit: Unit tests (check functions)
    engine: Check engine tests
    api: API endpoint tests
    model: Database model tests
