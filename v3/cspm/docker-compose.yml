###############################################################################
# CloudGuard Pro CSPM — Docker Compose
# Aniza Corp | Shahryar Jahangir
#
# Usage:
#   docker compose up -d           # SQLite (demo/dev)
#   docker compose --profile pg up -d  # PostgreSQL (production)
###############################################################################

version: "3.9"

services:
  cspm:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloudguard-pro-cspm:v3
    container_name: cloudguard-cspm
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./cspm.db}
      - SEED_DEMO_DATA=${SEED_DEMO_DATA:-true}
      - REPORTS_DIR=/reports
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # AWS
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      # Azure
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_SUBSCRIPTION_ID=${AZURE_SUBSCRIPTION_ID:-}
      # GCP
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      # IBM
      - IBMCLOUD_API_KEY=${IBMCLOUD_API_KEY:-}
      # PYTHONPATH
      - PYTHONPATH=/app
    volumes:
      - cspm_data:/app
      - cspm_reports:/reports
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL (optional, use with --profile pg) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cloudguard-postgres
    profiles: ["pg"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: cspm_db
      POSTGRES_USER: cspm_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cspm_secure_password_change_me}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cspm_user -d cspm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cspm_data:
    driver: local
  cspm_reports:
    driver: local
  pg_data:
    driver: local
